<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Grid Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafafa; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
    .wrap { width: 100%; max-width: 420px; }
    .setup { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .setup h2 { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    .field input, .field select { width: 100%; font-size: 13px; padding: 8px 10px; border-radius: 8px; border: 1px solid #ddd; background: #fafafa; color: #111; font-family: monospace; }
    .btn { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #111; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .btn:hover { background: #333; }
    .error { font-size: 12px; color: #c0392b; background: #fdf0ee; border-radius: 8px; padding: 8px 10px; margin-top: 8px; }
    .ig-card { background: #fff; border: 1px solid #dbdbdb; border-radius: 12px; overflow: hidden; }
    .ig-header { padding: 16px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #efefef; }
    .ig-avatar { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); padding: 2px; flex-shrink: 0; }
    .ig-avatar-inner { width: 100%; height: 100%; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .ig-avatar-inner span { font-size: 22px; font-weight: 700; color: #888; }
    .ig-stats { display: flex; gap: 16px; }
    .ig-stat { text-align: center; }
    .ig-stat strong { display: block; font-size: 14px; font-weight: 700; color: #111; }
    .ig-stat span { font-size: 11px; color: #666; }
    .ig-info { margin-top: 4px; }
    .ig-username { font-size: 14px; font-weight: 700; color: #111; }
    .ig-bio { font-size: 12px; color: #333; margin-top: 2px; line-height: 1.4; }
    .ig-tabs { display: flex; border-bottom: 1px solid #efefef; }
    .ig-tab { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; cursor: pointer; border-bottom: 2px solid transparent; }
    .ig-tab.active { border-bottom: 2px solid #111; }
    .ig-tab svg { width: 22px; height: 22px; stroke: #999; fill: none; stroke-width: 1.5; }
    .ig-tab.active svg { stroke: #111; }
    .ig-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .ig-cell { position: relative; aspect-ratio: 1; background: #efefef; overflow: hidden; cursor: pointer; }
    .ig-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .ig-cell-empty { display: flex; align-items: center; justify-content: center; }
    .ig-cell-empty svg { width: 24px; height: 24px; stroke: #ccc; fill: none; stroke-width: 1.5; }
    .dot { position: absolute; top: 6px; right: 6px; width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,.9); }
    .dot-published { background: #22c55e; }
    .dot-scheduled { background: #f59e0b; }
    .dot-draft { background: #94a3b8; }
    .reel-icon { position: absolute; top: 5px; left: 5px; }
    .reel-icon svg { width: 14px; height: 14px; fill: #fff; }
    .legend { display: flex; gap: 14px; justify-content: center; padding: 10px; border-top: 1px solid #efefef; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
    .legend-dot { width: 7px; height: 7px; border-radius: 50%; }
    .powered { text-align: center; margin-top: 12px; font-size: 11px; color: #bbb; }
    .powered span { color: #888; font-weight: 500; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="setup">
    <h2>Configuración</h2>
    <div class="field">
      <label>Token de integración</label>
      <input id="token" type="password" placeholder="secret_xxxxxxxxxxxxxxxx" />
    </div>
    <div class="field">
      <label>Database ID</label>
      <input id="dbid" type="text" placeholder="36cea83ddf6d800c..." />
    </div>
    <div class="field">
      <label>Ordenar por</label>
      <select id="sortby">
        <option value="Fecha">Fecha de publicación</option>
        <option value="Orden">Orden (número)</option>
      </select>
    </div>
    <button class="btn" onclick="loadGrid()">↻ Actualizar preview</button>
    <div id="error-box"></div>
  </div>

  <div class="ig-card">
    <div class="ig-header">
      <div class="ig-avatar">
        <div class="ig-avatar-inner"><span>@</span></div>
      </div>
      <div style="flex:1">
        <div class="ig-stats">
          <div class="ig-stat"><strong id="post-count">—</strong><span>posts</span></div>
          <div class="ig-stat"><strong>—</strong><span>seguidores</span></div>
          <div class="ig-stat"><strong>—</strong><span>seguidos</span></div>
        </div>
        <div class="ig-info">
          <div class="ig-username">@tu_usuario</div>
          <div class="ig-bio">Tu bio aquí ✨</div>
        </div>
      </div>
    </div>

    <div class="ig-tabs">
      <div class="ig-tab active" onclick="switchTab(this)">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <div class="ig-tab" onclick="switchTab(this)">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
      <div class="ig-tab" onclick="switchTab(this)">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
    </div>

    <div class="ig-grid" id="grid">
      <div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>
      <div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>
      <div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>
      <div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>
      <div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>
      <div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>
      <div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>
      <div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>
      <div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Published</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Scheduled</div>
      <div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div>Draft</div>
    </div>
  </div>

  <div class="powered">Widget by <span>evelynaguilar.com</span></div>
</div>

<script>
function dotClass(s) {
  if (!s) return 'dot-draft';
  s = s.toLowerCase();
  if (s === 'published') return 'dot-published';
  if (s === 'scheduled') return 'dot-scheduled';
  return 'dot-draft';
}

function switchTab(el) {
  document.querySelectorAll('.ig-tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
}
