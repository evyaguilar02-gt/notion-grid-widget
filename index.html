<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Feed Preview · The Creator Vault</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafafa;display:flex;justify-content:center;padding:1rem;min-height:100vh}
.wrap{width:100%;max-width:420px}
.setup{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1.25rem;margin-bottom:1.5rem}
.setup h2{font-size:13px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:#666;margin-bottom:4px}
.field input,.field select{width:100%;font-size:13px;padding:8px 10px;border-radius:8px;border:1px solid #ddd;background:#fafafa;color:#111}
.btn-primary{width:100%;padding:10px;border-radius:8px;border:none;background:#111;color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-primary:hover{background:#333}
.btn-secondary{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#111;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}
.btn-secondary:hover{background:#f5f5f5}
.error{font-size:12px;color:#c0392b;background:#fdf0ee;border-radius:8px;padding:8px 10px;margin-top:8px}
.success{font-size:12px;color:#1a6b3c;background:#e8f5e9;border-radius:8px;padding:8px 10px;margin-top:8px;word-break:break-all}
.ig-card{background:#fff;border:1px solid #dbdbdb;border-radius:12px;overflow:hidden}
.ig-header{padding:16px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #efefef;position:relative}
.ig-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);padding:2px;flex-shrink:0}
.ig-avatar-inner{width:100%;height:100%;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ig-avatar-inner span{font-size:22px;font-weight:700;color:#888}
.ig-stats{display:flex;gap:16px}
.ig-stat{text-align:center}
.ig-stat strong{display:block;font-size:14px;font-weight:700;color:#111}
.ig-stat span{font-size:11px;color:#666}
.ig-info{margin-top:4px;flex:1}
.ig-username{font-size:14px;font-weight:700;color:#111}
.ig-bio{font-size:12px;color:#333;margin-top:2px;line-height:1.4}
.edit-btn{position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;font-size:14px;opacity:.4;padding:4px}
.edit-btn:hover{opacity:1}
.edit-panel{padding:12px 16px;border-bottom:1px solid #efefef;background:#fafafa;display:none}
.edit-panel.open{display:block}
.edit-panel input{width:100%;font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#111;margin-bottom:8px}
.edit-panel button{width:100%;padding:8px;border-radius:8px;border:none;background:#111;color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.ig-toolbar{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:1px solid #efefef;background:#fafafa}
.ig-timer{font-size:10px;color:#bbb}
.ig-refresh-btn{background:none;border:none;cursor:pointer;font-size:11px;color:#888;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px}
.ig-refresh-btn:hover{background:#efefef;color:#111}
.ig-refresh-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.ig-tabs{display:flex;border-bottom:1px solid #efefef}
.ig-tab{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;cursor:pointer;border-bottom:2px solid transparent}
.ig-tab.active{border-bottom:2px solid #111}
.ig-tab svg{width:22px;height:22px;stroke:#999;fill:none;stroke-width:1.5}
.ig-tab.active svg{stroke:#111}
.ig-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.ig-cell{position:relative;aspect-ratio:3/4;background:#efefef;overflow:hidden;cursor:pointer}
.ig-cell img{width:100%;height:100%;object-fit:cover;display:block}
.ig-cell-empty{display:flex;align-items:center;justify-content:center}
.ig-cell-empty svg{width:24px;height:24px;stroke:#ccc;fill:none;stroke-width:1.5}
.format-icon{position:absolute;top:6px;right:6px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6))}
.status-pill{position:absolute;bottom:6px;left:6px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:600;backdrop-filter:blur(4px);white-space:nowrap}
.pill-publicado{background:rgba(34,197,94,.85);color:#fff}
.pill-programado{background:rgba(245,158,11,.85);color:#fff}
.pill-produccion{background:rgba(180,180,180,.85);color:#fff}
.legend{display:flex;gap:10px;justify-content:center;padding:10px;border-top:1px solid #efefef;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#888}
.legend-dot{width:8px;height:8px;border-radius:50%}
.powered{text-align:center;margin-top:12px;font-size:11px;color:#bbb}
.powered span{color:#888;font-weight:500}
</style>
</head>
<body>
<div class="wrap" id="wrap"></div>
<script>
var REFRESH_MS=5*60*1000;
var refreshTimer=null;
var countdownTimer=null;
var nextRefresh=null;
var currentConfig={};

function getParams(){
  var p={};
  window.location.search.substring(1).split('&').forEach(function(s){
    var pair=s.split('=');
    if(pair[0])p[decodeURIComponent(pair[0])]=decodeURIComponent(pair[1]||'');
  });
  return p;
}

var params=getParams();
var embedMode=!!(params.token&&params.dbid);

function pillClass(s){
  if(!s)return 'pill-produccion';
  if(s.indexOf('Publicado')!==-1||s.indexOf('Published')!==-1)return 'pill-publicado';
  if(s.indexOf('Programado')!==-1||s.indexOf('Scheduled')!==-1)return 'pill-programado';
  return 'pill-produccion';
}

function pillText(s){
  if(!s)return '🎬 En Producción';
  if(s.indexOf('Publicado')!==-1||s.indexOf('Published')!==-1)return '🚀 Publicado';
  if(s.indexOf('Programado')!==-1||s.indexOf('Scheduled')!==-1)return '⏰ Programado';
  return '🎬 En Producción';
}

function formatIcon(f){
  f=(f||'').toLowerCase();
  if(f.indexOf('reel')!==-1)return '<div class="format-icon"><svg viewBox="0 0 24 24" width="18" height="18"><rect x="1" y="1" width="22" height="22" rx="6" fill="rgba(0,0,0,0.55)"/><polygon points="10,8 16,12 10,16" fill="white"/></svg></div>';
  if(f.indexOf('carrusel')!==-1)return '<div class="format-icon"><svg viewBox="0 0 26 22" width="20" height="18"><rect x="0" y="4" width="16" height="16" rx="2" fill="rgba(0,0,0,0.4)" stroke="white" stroke-width="1.2"/><rect x="8" y="0" width="16" height="16" rx="2" fill="rgba(0,0,0,0.65)" stroke="white" stroke-width="1.2"/></svg></div>';
  return '';
}

function switchTab(el){
  document.querySelectorAll('.ig-tab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
}

function buildGrid(pages){
  if(!pages||!pages.length)return '<div style="grid-column:1/-1;text-align:center;padding:2rem;font-size:13px;color:#888">No hay entradas para esta red aún.</div>';
  var html='';
  for(var i=0;i<9;i++){
    var page=pages[i];
    if(!page){html+='<div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24" style="width:24px;height:24px;stroke:#ddd;fill:none;stroke-width:1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></div>';continue;}
    var imgUrl=page._directImg||null;
    var status=page._status||'';
    var formato=page._formato||'';
    var pill=pillClass(status);
    var pillTxt=pillText(status);
    var fmtIcon=formatIcon(formato);
    if(imgUrl){
      html+='<div class="ig-cell"><img src="'+imgUrl+'" loading="lazy"/>'+fmtIcon+'<div class="status-pill '+pill+'">'+pillTxt+'</div></div>';
    }else{
      html+='<div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24" style="width:24px;height:24px;stroke:#ccc;fill:none;stroke-width:1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>'+fmtIcon+'<div class="status-pill '+pill+'" style="position:absolute;bottom:6px;left:6px;">'+pillTxt+'</div></div>';
    }
  }
  return html;
}

function renderWidget(containerId,cfg,pages){
  var avatarLetter=cfg.username?cfg.username.replace('@','').charAt(0).toUpperCase():'@';
  var username=cfg.username||'@tu_usuario';
  var bio=cfg.bio||'Social Media Manager · UGC Creator · Nombre de tu marca';
  var count=pages?pages.length:'—';
  document.getElementById(containerId).innerHTML=
    '<div class="ig-card">'+
    '<div class="ig-header">'+
    '<div class="ig-avatar"><div class="ig-avatar-inner"><span id="avatar-letter">'+avatarLetter+'</span></div></div>'+
    '<div style="flex:1">'+
    '<div class="ig-stats">'+
    '<div class="ig-stat"><strong>'+count+'</strong><span>posts</span></div>'+
    '<div class="ig-stat"><strong>—</strong><span>seguidores</span></div>'+
    '<div class="ig-stat"><strong>—</strong><span>seguidos</span></div>'+
    '</div>'+
    '<div class="ig-info">'+
    '<div class="ig-username" id="disp-user">'+username+'</div>'+
    '<div class="ig-bio" id="disp-bio">'+bio+'</div>'+
    '</div></div>'+
    '<button class="edit-btn" id="edit-toggle" title="Editar perfil">✏️</button>'+
    '</div>'+
    '<div class="edit-panel" id="edit-panel">'+
    '<input id="edit-username" type="text" placeholder="@tu_usuario · @agencia · @marca"/>'+
    '<input id="edit-bio" type="text" placeholder="Social Media Manager · UGC Creator · Nombre de tu marca"/>'+
    '<button id="edit-save">Guardar</button>'+
    '</div>'+
    '<div class="ig-toolbar">'+
    '<span class="ig-timer" id="countdown-text">Auto-refresh en 5:00</span>'+
    '<button class="ig-refresh-btn" id="btn-refresh">'+
    '<svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>'+
    'Actualizar</button>'+
    '</div>'+
    '<div class="ig-tabs">'+
    '<div class="ig-tab active" id="tab1"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>'+
    '<div class="ig-tab" id="tab2"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" fill="none" stroke-width="1.5"/><polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/></svg></div>'+
    '<div class="ig-tab" id="tab3"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></div>'+
    '<div class="ig-tab" id="tab4"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>'+
    '</div>'+
    '<div class="ig-grid" id="grid-cells">'+buildGrid(pages)+'</div>'+
    '<div class="legend">'+
    '<div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>🚀 Publicado</div>'+
    '<div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>⏰ Programado</div>'+
    '<div class="legend-item"><div class="legend-dot" style="background:#b4b4b4"></div>🎬 En Producción</div>'+
    '</div></div>';

  document.getElementById('tab1').addEventListener('click',function(){switchTab(this)});
  document.getElementById('tab2').addEventListener('click',function(){switchTab(this)});
  document.getElementById('tab3').addEventListener('click',function(){switchTab(this)});
  document.getElementById('tab4').addEventListener('click',function(){switchTab(this)});

  document.getElementById('edit-toggle').addEventListener('click',function(){
    document.getElementById('edit-panel').classList.toggle('open');
  });

  document.getElementById('edit-save').addEventListener('click',function(){
    var newUser=document.getElementById('edit-username').value.trim();
    var newBio=document.getElementById('edit-bio').value.trim();
    if(newUser){
      document.getElementById('disp-user').textContent=newUser;
      document.getElementById('avatar-letter').textContent=newUser.replace('@','').charAt(0).toUpperCase();
      currentConfig.username=newUser;
    }
    if(newBio){
      document.getElementById('disp-bio').textContent=newBio;
      currentConfig.bio=newBio;
    }
    document.getElementById('edit-panel').classList.remove('open');
  });

  document.getElementById('btn-refresh').addEventListener('click',function(){
    recargarGrid(currentConfig,'widget-area');
    resetAutoRefresh(currentConfig,'widget-area');
  });
}

function recargarGrid(cfg,containerId){
  var gridEl=document.getElementById('grid-cells');
  if(gridEl)gridEl.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:2rem;font-size:13px;color:#888">Cargando...</div>';
  fetch('/api/notion',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:cfg.token,dbid:cfg.dbid,sortby:cfg.sortby,red:cfg.red})
  })
  .then(function(res){return res.json().then(function(d){return{ok:res.ok,data:d}});})
  .then(function(result){
    var pages=result.ok?result.data.results:[];
    var gridEl2=document.getElementById('grid-cells');
    if(gridEl2){
      gridEl2.innerHTML=buildGrid(pages);
      var countEl=document.querySelector('.ig-stat strong');
      if(countEl&&pages&&pages.length)countEl.textContent=pages.length;
    }
  })
  .catch(function(){
    var gridEl3=document.getElementById('grid-cells');
    if(gridEl3)gridEl3.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:1rem;font-size:12px;color:#c0392b">Error de conexión.</div>';
  });
}

function startCountdown(){
  if(countdownTimer)clearInterval(countdownTimer);
  nextRefresh=Date.now()+REFRESH_MS;
  countdownTimer=setInterval(function(){
    var rem=nextRefresh-Date.now();
    if(rem<0)rem=0;
    var m=Math.floor(rem/60000);
    var s=Math.floor((rem%60000)/1000);
    var el=document.getElementById('countdown-text');
    if(el)el.textContent='Auto-refresh en '+m+':'+(s<10?'0':'')+s;
  },1000);
}

function startAutoRefresh(cfg,containerId){
  if(refreshTimer)clearTimeout(refreshTimer);
  startCountdown();
  refreshTimer=setTimeout(function(){
    recargarGrid(cfg,containerId);
    startAutoRefresh(cfg,containerId);
  },REFRESH_MS);
}

function resetAutoRefresh(cfg,containerId){
  startAutoRefresh(cfg,containerId);
}

function getFormConfig(){
  var token=document.getElementById('p-token').value.trim();
  var dbid=document.getElementById('p-dbid').value.trim().replace(/-/g,'');
  if(!token||!dbid){
    document.getElementById('error-box').innerHTML='<div class="error">Ingresa el token y el database ID.</div>';
    return null;
  }
  document.getElementById('error-box').innerHTML='';
  return{
    token:token,
    dbid:dbid,
    username:document.getElementById('p-username').value.trim(),
    bio:document.getElementById('p-bio').value.trim(),
    red:document.getElementById('p-red').value,
    sortby:document.getElementById('p-sortby').value
  };
}

function renderSetup(){
  document.getElementById('wrap').innerHTML=
    '<div class="setup">'+
    '<h2>Configuración</h2>'+
    '<div class="field"><label>Token de integración</label><input id="p-token" type="password" placeholder="secret_xxxxxxxxxxxxxxxx"/></div>'+
    '<div class="field"><label>Database ID</label><input id="p-dbid" type="text" placeholder="ID de tu base de datos"/></div>'+
    '<div class="field"><label>Usuario</label><input id="p-username" type="text" placeholder="@tu_usuario"/></div>'+
    '<div class="field"><label>Bio</label><input id="p-bio" type="text" placeholder="Social Media Manager · UGC Creator · Nombre de tu marca"/></div>'+
    '<div class="field"><label>Red social</label><select id="p-red">'+
    '<option value="📱 Instagram">📱 Instagram</option>'+
    '<option value="🎬 TikTok">🎬 TikTok</option>'+
    '<option value="🔴 YouTube">🔴 YouTube</option>'+
    '<option value="👥 LinkedIn">👥 LinkedIn</option>'+
    '<option value="🔵 Facebook">🔵 Facebook</option>'+
    '</select></div>'+
    '<div class="field"><label>Ordenar por</label><select id="p-sortby">'+
    '<option value="desc">Más reciente primero</option>'+
    '<option value="asc">Más antiguo primero</option>'+
    '</select></div>'+
    '<button class="btn-primary" id="btn-preview">↻ Ver preview</button>'+
    '<button class="btn-secondary" id="btn-genurl">🔗 Generar URL para Notion</button>'+
    '<div id="url-output"></div>'+
    '<div id="error-box"></div>'+
    '</div>'+
    '<div id="widget-area"></div>'+
    '<div class="powered">Widget by <span>evelynaguilar.com</span></div>';

  document.getElementById('btn-preview').addEventListener('click',function(){
    var cfg=getFormConfig();
    if(!cfg)return;
    currentConfig=cfg;
    fetch('/api/notion',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:cfg.token,dbid:cfg.dbid,sortby:cfg.sortby,red:cfg.red})
    })
    .then(function(res){return res.json().then(function(d){return{ok:res.ok,data:d}});})
    .then(function(result){
      var pages=result.ok?result.data.results:[];
      renderWidget('widget-area',cfg,pages);
      startAutoRefresh(cfg,'widget-area');
    })
    .catch(function(){renderWidget('widget-area',cfg,[]);});
  });

  document.getElementById('btn-genurl').addEventListener('click',function(){
    var cfg=getFormConfig();
    if(!cfg)return;
    var url=window.location.origin+window.location.pathname+
      '?token='+encodeURIComponent(cfg.token)+
      '&dbid='+encodeURIComponent(cfg.dbid)+
      '&username='+encodeURIComponent(cfg.username)+
      '&bio='+encodeURIComponent(cfg.bio)+
      '&red='+encodeURIComponent(cfg.red)+
      '&sortby='+encodeURIComponent(cfg.sortby);
    document.getElementById('url-output').innerHTML='<div class="success">Copia esta URL y pégala en Notion con /embed:<br><br>'+url+'</div>';
  });
}

if(embedMode){
  var cfg={
    token:params.token,
    dbid:params.dbid.replace(/-/g,''),
    username:params.username||'',
    bio:params.bio||'',
    red:params.red||'📱 Instagram',
    sortby:params.sortby||'desc'
  };
  currentConfig=cfg;
  document.getElementById('wrap').innerHTML='<div id="widget-area"></div><div class="powered">Widget by <span>evelynaguilar.com</span></div>';
  fetch('/api/notion',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:cfg.token,dbid:cfg.dbid,sortby:cfg.sortby,red:cfg.red})
  })
  .then(function(res){return res.json().then(function(d){return{ok:res.ok,data:d}});})
  .then(function(result){
    var pages=result.ok?result.data.results:[];
    renderWidget('widget-area',cfg,pages);
    startAutoRefresh(cfg,'widget-area');
  })
  .catch(function(){
    renderWidget('widget-area',cfg,[]);
    startAutoRefresh(cfg,'widget-area');
  });
}else{
  renderSetup();
}
</script>
<!-- build v16 -->
</body>
</html>
