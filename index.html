<html lang="es">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafafa;display:flex;justify-content:center;padding:2rem 1rem;min-height:100vh}
.wrap{width:100%;max-width:420px}
.setup{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1.25rem;margin-bottom:1.5rem}
.setup h2{font-size:13px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:#666;margin-bottom:4px}
.field input,.field select{width:100%;font-size:13px;padding:8px 10px;border-radius:8px;border:1px solid #ddd;background:#fafafa;color:#111;font-family:monospace}
#btnLoad{width:100%;padding:10px;border-radius:8px;border:none;background:#111;color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px}
#btnLoad:hover{background:#333}
.error{font-size:12px;color:#c0392b;background:#fdf0ee;border-radius:8px;padding:8px 10px;margin-top:8px}
.ig-card{background:#fff;border:1px solid #dbdbdb;border-radius:12px;overflow:hidden}
.ig-header{padding:16px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #efefef}
.ig-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);padding:2px;flex-shrink:0}
.ig-avatar-inner{width:100%;height:100%;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ig-avatar-inner span{font-size:22px;font-weight:700;color:#888}
.ig-stats{display:flex;gap:16px}
.ig-stat{text-align:center}
.ig-stat strong{display:block;font-size:14px;font-weight:700;color:#111}
.ig-stat span{font-size:11px;color:#666}
.ig-info{margin-top:4px}
.ig-username{font-size:14px;font-weight:700;color:#111}
.ig-bio{font-size:12px;color:#333;margin-top:2px;line-height:1.4}
.ig-tabs{display:flex;border-bottom:1px solid #efefef}
.ig-tab{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;cursor:pointer;border-bottom:2px solid transparent}
.ig-tab.active{border-bottom:2px solid #111}
.ig-tab svg{width:22px;height:22px;stroke:#999;fill:none;stroke-width:1.5}
.ig-tab.active svg{stroke:#111}
.ig-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.ig-cell{position:relative;aspect-ratio:9/16;background:#efefef;overflow:hidden;cursor:pointer}
.ig-cell img{width:100%;height:100%;object-fit:cover;display:block}
.ig-cell-empty{display:flex;align-items:center;justify-content:center}
.ig-cell-empty svg{width:24px;height:24px;stroke:#ccc;fill:none;stroke-width:1.5}
.dot{position:absolute;top:8px;right:8px;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.dot-published{background:#22c55e}
.dot-scheduled{background:#f59e0b}
.dot-draft{background:#94a3b8}
.legend{display:flex;gap:14px;justify-content:center;padding:10px;border-top:1px solid #efefef}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#888}
.legend-dot{width:9px;height:9px;border-radius:50%}
.powered{text-align:center;margin-top:12px;font-size:11px;color:#bbb}
.powered span{color:#888;font-weight:500}
</style>
</head>
<body>

<div class="field"><label>Database ID</label><input id="dbid" type="text" placeholder="36cea83ddf6d800c..."/></div>
<div class="field"><label>Username</label><input id="username" type="text" placeholder="@tu_usuario"/></div>
<div class="field"><label>Bio</label><input id="bio" type="text" placeholder="Social Media Manager · UGC Creator · Tu nicho ✨"/></div>

</div>

</div>

<div class="ig-tabs">
<div class="ig-tab active" id="tab1"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
<div class="ig-tab" id="tab2"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
<div class="ig-tab" id="tab3"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
</div>

<div class="ig-grid" id="grid">
<div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>
<div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>

<div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>

<div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Scheduled</div>
<div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div>Draft</div>
</div>

<div class="powered">Widget by <span>evelynaguilar.com</span></div>
</div>

<script>
document.getElementById('tab1').addEventListener('click',function(){switchTab(this)});
document.getElementById('tab2').addEventListener('click',function(){switchTab(this)});
document.getElementById('tab3').addEventListener('click',function(){switchTab(this)});
document.getElementById('btnLoad').addEventListener('click',function(){loadGrid()});

document.getElementById('username').addEventListener('input',function(){
var val=this.value.trim();
document.getElementById('display-username').textContent=val||'@tu_usuario';
document.getElementById('avatar-letter').textContent=val?val.replace('@','').charAt(0).toUpperCase():'@';
});

document.getElementById('bio').addEventListener('input',function(){
document.getElementById('display-bio').textContent=this.value.trim()||'Tu bio aquí ✨';
});

function switchTab(el){
document.querySelectorAll('.ig-tab').forEach(function(t){t.classList.remove('active')});
el.classList.add('active');
}

function getStatus(properties){
if(!properties||!properties.Status)return 'Draft';
var s=properties.Status;
if(s.status&&s.status.name)return s.status.name;
if(s.select&&s.select.name)return s.select.name;
return 'Draft';
}

function dotClass(s){
if(!s)return 'dot-draft';
s=s.toLowerCase();
if(s==='published')return 'dot-published';
if(s==='scheduled')return 'dot-scheduled';
return 'dot-draft';
}

function emptyGrid(){
var c='<div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24" style="width:24px;height:24px;stroke:#ccc;fill:none;stroke-width:1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></div>';
var h='';for(var i=0;i<9;i++)h+=c;return h;
}

function loadGrid(){
var token=document.getElementById('token').value.trim();
var dbid=document.getElementById('dbid').value.trim().replace(/-/g,'');
var sortby=document.getElementById('sortby').value;
var username=document.getElementById('username').value.trim();
var bio=document.getElementById('bio').value.trim();
var errBox=document.getElementById('error-box');
var grid=document.getElementById('grid');

errBox.innerHTML='';

if(username)document.getElementById('display-username').textContent=username;
if(bio)document.getElementById('display-bio').textContent=bio;

if(!token||!dbid){
errBox.innerHTML='<div class="error">Ingresa el token y el database ID.</div>';
return;
}

grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:2rem;font-size:13px;color:#888">Cargando...</div>';

fetch('/api/notion',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({token:token,dbid:dbid,sortby:sortby})
})
.then(function(res){return res.json().then(function(data){return{ok:res.ok,data:data}})})
.then(function(result){
if(!result.ok){
errBox.innerHTML='<div class="error">'+(result.data.message||'Error al conectar.')+'</div>';
grid.innerHTML=emptyGrid();
return;
}
var pages=result.data.results;
if(!pages||!pages.length){
grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:2rem;font-size:13px;color:#888">No hay entradas aún.</div>';
return;
}
document.getElementById('post-count').textContent=pages.length;
var html='';
for(var i=0;i<9;i++){
var page=pages[i];
if(!page){html+='<div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24" style="width:24px;height:24px;stroke:#ddd;fill:none;stroke-width:1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></div>';continue;}
var imgUrl=page._directImg||null;
var status=getStatus(page.properties);
var dot=dotClass(status);
if(imgUrl){
html+='<div class="ig-cell"><img src="'+imgUrl+'" loading="lazy"/><div class="dot '+dot+'"></div></div>';
}else{
html+='<div class="ig-cell ig-cell-empty"><svg viewBox="0 0 24 24" style="width:24px;height:24px;stroke:#ccc;fill:none;stroke-width:1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg><div class="dot '+dot+'" style="position:absolute;top:8px;right:8px;"></div></div>';
}
}
grid.innerHTML=html;
})
.catch(function(){
errBox.innerHTML='<div class="error">Error de conexión.</div>';
grid.innerHTML=emptyGrid();
});
}
</script>
<!-- build v6 -->
</body>
</html>
